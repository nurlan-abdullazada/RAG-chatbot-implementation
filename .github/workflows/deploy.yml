name: RAG Chatbot CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Code Quality & Testing
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test Python imports
      run: |
        python -c "
        try:
            print('Testing imports...')
            import fastapi
            import streamlit
            import boto3
            print('✅ All core dependencies imported successfully')
        except Exception as e:
            print(f'❌ Import error: {e}')
            exit(1)
        "
    
    - name: Test Docker Compose configuration
      run: |
        # Create dummy .env for testing
        echo "AWS_ACCESS_KEY_ID=test" > .env
        echo "AWS_SECRET_ACCESS_KEY=test" >> .env
        echo "AWS_REGION=us-east-1" >> .env
        echo "CLAUDE_MODEL_ID=test" >> .env
        echo "BACKEND_HOST=0.0.0.0" >> .env
        echo "BACKEND_PORT=8000" >> .env
        
        # Test docker-compose config
        docker-compose config
    
    - name: Success notification
      run: |
        echo "🎉 CI/CD Pipeline completed successfully!"
        echo "✅ Dependencies check passed"
        echo "✅ Docker Compose configuration valid"
        echo "✅ Ready for deployment"
