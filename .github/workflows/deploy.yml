name: Deploy RAG Chatbot

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort
        pip install -r requirements.txt
    
    - name: Run Black (Code Formatting)
      run: |
        black --check --diff .
      continue-on-error: true
    
    - name: Run isort (Import Sorting)
      run: |
        isort --check-only --diff .
      continue-on-error: true
    
    - name: Run Ruff (Linting)
      run: |
        ruff check .
      continue-on-error: true
    
    - name: Test Import Structure
      run: |
        python -c "
        try:
            import main
            import models
            import config
            import bedrock_service
            print('✅ All imports successful')
        except Exception as e:
            print(f'❌ Import error: {e}')
            exit(1)
        "

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build Test
    needs: code-quality
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Create dummy .env file
      run: |
        echo "AWS_ACCESS_KEY_ID=dummy" > .env
        echo "AWS_SECRET_ACCESS_KEY=dummy" >> .env
        echo "AWS_REGION=us-east-1" >> .env
        echo "CLAUDE_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0" >> .env
        echo "BACKEND_HOST=0.0.0.0" >> .env
        echo "BACKEND_PORT=8000" >> .env
        echo "FRONTEND_PORT=8501" >> .env
    
    - name: Test Docker Build - Backend
      run: |
        docker build -f backend/Dockerfile -t rag-backend .
    
    - name: Test Docker Build - Frontend
      run: |
        docker build -f frontend/Dockerfile -t rag-frontend .
    
    - name: Test Docker Compose
      run: |
        docker-compose config

  deploy:
    runs-on: self-hosted
    name: Deploy to EC2
    needs: [code-quality, docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Stop existing containers
      run: |
        cd ${{ github.workspace }}
        docker-compose down || true
    
    - name: Pull latest changes
      run: |
        cd ${{ github.workspace }}
        git pull origin main || git pull origin master
    
    - name: Build and deploy
      run: |
        cd ${{ github.workspace }}
        docker-compose up --build -d
    
    - name: Health check
      run: |
        cd ${{ github.workspace }}
        sleep 30
        curl -f http://localhost:8080/health || exit 1
        echo "✅ Deployment successful!"
    
    - name: Clean up old images
      run: |
        docker system prune -f
